services:
  # Loadbalancer - Nginx
  loadbalancer:
    image: nginx:latest
    container_name: edugame_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web1
      - web2
    networks:
      - edugame_net

  # Website 1 - Apache
  web1:
    image: httpd:2.4
    container_name: edugame_web1
    volumes:
      - ./web1/index.html:/usr/local/apache2/htdocs/index.html:ro
    networks:
      - edugame_net

  # Website 2 - Apache
  web2:
    image: httpd:2.4
    container_name: edugame_web2
    volumes:
      - ./web2/index.html:/usr/local/apache2/htdocs/index.html:ro
    networks:
      - edugame_net

networks:
  edugame_net:
    driver: bridge